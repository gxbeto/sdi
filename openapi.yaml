          - type: 'null'
          title: Comprobante
        stock_total_actual:
          anyOf:
          - type: number
            multipleOf: 0.001
            minimum: 0.0
            format: decimal
            example: 10
          - type: 'null'
          title: Stock Total Actual
      type: object
      required:
      - mensaje_id
      - estado_procesamiento
      - producto_id
      title: CompraEventoOut
      example:
        comprobante: STK-001-000004-0
        documento_ref: OC-001-000555
        estado_procesamiento: PROCESADO
        mensaje_id: CMP-2026-0001
        producto_id: 1
        stock_total_actual: 18
    ConfirmarReservaIn:
