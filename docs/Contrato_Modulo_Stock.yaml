openapi: 3.2.0
info:
  title: SDI - Servicio Distribuido de Inventario
  summary: API de gestion de stock para integracion entre modulos ERP.
  description: '

    API REST del modulo de Stock del sistema SDI.


    Permite administrar productos, consultar stock, crear reservas,

    confirmar ventas, liberar reservas y procesar eventos de compra.


    Esta API esta pensada para integracion entre sistemas internos:

    - Modulo de Ventas

    - Modulo de Compras

    - Modulo de Stock

    - Servicios administrativos internos


    La primera version no incluye seguridad formal. El consumo debe realizarse

    en ambiente controlado de red interna o infraestructura protegida.

    '
  termsOfService: https://docs.sdi.local/terminos-api
  contact:
    name: Equipo SDI - Sistema Distribuido de Inventario
    email: gxbeto@gmail.com
  license:
    name: Uso de la catedra Programacion de Aplicaiciones en Red - Profesor Alfonso
      Fernandez
  version: 0.1.0
servers:
- url: http://127.0.0.1:8000
  description: Ambiente local de desarrollo
- url: http://sdi-pruebas.example.com:6000
  description: Ambiente de pruebas / integracion
paths:
  /health:
    get:
      tags:
      - health
      summary: Verificar disponibilidad del servicio SDI
      description: Retorna un estado simple para confirmar que la API esta levantada
        y responde requests HTTP.
      operationId: verificarDisponibilidad
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthOut'
              example:
                status: ok
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
  /productos:
    post:
      tags:
      - productos
      summary: Crear producto e inicializar su stock en cero
      description: Registra un producto activo en el catalogo e inserta automaticamente
        su fila en stock_actual con cantidades en cero.
      operationId: crearProducto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductoCreate'
      responses:
        '201':
          description: Producto creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductoCreated'
              example:
                producto_id: 1
                codigo: P001
                estado: CREADO
        '409':
          description: Ya existe un producto con el mismo codigo.
          content:
            application/json:
              example:
                estado: ERROR
                codigo: PRODUCTO_CODIGO_DUPLICADO
                mensaje: Ya existe un producto con el codigo P001.
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    get:
      tags:
      - productos
      summary: Listar productos con filtros opcionales
      description: Lista productos del catalogo. Permite filtrar por codigo exacto
        y por estado activo/inactivo.
      operationId: listarProductos
      parameters:
      - name: filtro
        in: query
        required: false
        schema:
          type: string
          minLength: 1
          maxLength: 50
        description: CÃ³digo exacto del producto. Escriba cualquier cÃ³digo, por ejemplo
          P001.
      - name: activo
        in: query
        required: false
        schema:
          type: boolean
        description: Estado del producto. Use true para activos y false para inactivos.
      responses:
        '200':
          description: Lista de productos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductoOut'
                title: Response Listar Productos Productos Get
              example:
              - producto_id: 1
                codigo: P001
                nombre: Producto A
                descripcion: Producto de ejemplo
                categoria: General
                unidad_medida: UNIDAD
                impuesto: 10.1
                activo: true
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /productos/{producto_id}:
    get:
      tags:
      - productos
      summary: Consultar producto por identificador
      description: 'Devuelve los datos del producto con vista personalizable. Use
        el parÃ¡metro ''view'' para seleccionar quÃ© datos retornar: ''producto'' (default),
        ''stock'', ''precios'' o combinaciones como ''producto,stock,precios''.'
      operationId: obtenerProducto
      parameters:
      - name: producto_id
        in: path
        required: true
        schema:
          type: integer
          title: Producto Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
      - name: view
        in: query
        required: false
        schema:
          type: string
          enum:
          - producto
          - stock
          - precios
          - producto,stock
          - producto,precios
          - stock,precios
          - producto,stock,precios
          title: View
        description: 'Vistas a incluir en la respuesta. Opciones: ''producto'' (datos
          maestros), ''stock'' (cantidades), ''precios'' (precios vigentes). Se pueden
          combinar separadas por coma.'
      responses:
        '200':
          description: Producto consultado segÃºn las vistas solicitadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductoViewOut'
              examples:
                vistaProductoStockPrecios:
                  summary: Vista producto, stock y precios
                  value:
                    producto_id: 1
                    codigo: P001
                    nombre: Producto A
                    descripcion: Producto de ejemplo
                    categoria: General
                    unidad_medida: UND
                    impuesto: 10.1
                    activo: true
                    cantidad_total: 10
                    cantidad_reservada: 2
                    cantidad_disponible: 8
                    precio_venta: 15230
                    precio_compra: 9200
                producto:
                  summary: Vista producto
                  value:
                    producto_id: 1
                    codigo: P001
                    nombre: Producto A
                    descripcion: Producto de ejemplo
                    categoria: General
                    unidad_medida: UND
                    Impuesto: 10.1
                    activo: true
                stock:
                  summary: Vista stock
                  value:
                    cantidad_total: 10
                    cantidad_reservada: 2
                    cantidad_disponible: 8
                precios:
                  summary: Vista precios
                  value:
                    Precio_Venta: 15230
                    Precio_Compra: 9200
        '404':
          description: El producto solicitado no existe.
          content:
            application/json:
              example:
                estado: ERROR
                codigo: PRODUCTO_NO_EXISTE
                mensaje: El producto 1 no existe.
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /stock/movimientos:
    get:
      tags:
      - stock
      summary: Consultar historial de movimientos de stock
      description: Devuelve la trazabilidad de compras, reservas, ventas, liberaciones
        y ajustes. Permite filtrar por producto, documento de referencia y tipo de
        movimiento.
      operationId: listarMovimientosStock
      parameters:
      - name: producto_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          title: Producto Id
          description: Debe ser un identificador entero positivo.
      - name: comprobante
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^[A-Z]{1,3}-\d{3}-\d{5}$
            example: FV-000-00000
          - type: 'null'
          title: Comprobante
          description: Referencia documental operativa con un prefijo de una a tres
            letras mayÃºsculas, seguido del formato 000-00000.
      - name: tipo_movimiento
        in: query
        required: false
        schema:
          type: string
          enum:
          - COMPRA
          - RESERVA
          - VENTA
          - LIBERACION_RESERVA
          - AJUSTE
          title: Tipo Movimiento
        description: Tipo de movimiento de stock usado como filtro de consulta.
      responses:
        '200':
          description: Lista de movimientos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovimientoOut'
                title: Response Listar Movimientos Stock Movimientos Get
              example:
              - movimiento_id: 50
                producto_id: 1
                reserva_id: 101
                tipo_movimiento: VENTA
                origen: VENTAS
                comprobante: STK-000-00000
                cantidad: 2
                stock_anterior: 10
                stock_posterior: 8
                observacion: Confirmacion de venta desde reserva
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /stock/reservas:
    post:
      tags:
      - stock
      summary: Crear reserva de stock para uno o mas productos
      description: Valida productos activos y stock disponible, bloquea las filas
        de stock involucradas, incrementa la cantidad reservada y registra movimientos
        de tipo RESERVA.
      operationId: crearReserva
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservaCreate'
        required: true
      responses:
        '201':
          description: Reserva creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaCreateOut'
              example:
                estado: RESERVADO
                comprobante: STK-000-00000
                reservas:
                - reserva_id: 101
                  producto_id: 1
                  cantidad_reservada: 2
                  cantidad_disponible: 8
        '400':
          description: El producto existe, pero no puede operar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                estado: ERROR
                codigo: PRODUCTO_INACTIVO
                mensaje: El producto 1 esta inactivo.
        '404':
          description: El producto solicitado no existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                estado: ERROR
                codigo: PRODUCTO_NO_EXISTE
                mensaje: El producto 1 no existe.
        '409':
          description: No hay stock disponible suficiente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                estado: ERROR
                codigo: STOCK_INSUFICIENTE
                mensaje: 'Stock insuficiente para el producto 1: solicitado 2, disponible
                  1.'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /compras/eventos:
    post:
      tags:
      - compras
      summary: Procesar evento de compra e incrementar stock
      description: Procesa un evento de compra recibido por HTTP o reenviado desde
        RabbitMQ, evita duplicados por mensaje_id, incrementa stock y registra movimiento
        y precio de compra.
      operationId: procesarEventoCompra
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompraEventoIn'
        required: true
      responses:
        '200':
          description: Evento de compra procesado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompraEventoOut'
              example:
                mensaje_id: CMP-2026-0001
                estado_procesamiento: PROCESADO
                producto_id: 1
                stock_total_actual: 18
        '400':
          description: El producto existe, pero no puede operar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                estado: ERROR
                codigo: PRODUCTO_INACTIVO
                mensaje: El producto 1 esta inactivo.
        '404':
          description: El producto solicitado no existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                estado: ERROR
                codigo: PRODUCTO_NO_EXISTE
                mensaje: El producto 1 no existe.
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /ventas/confirmar:
    post:
      tags:
      - ventas
      summary: Confirmar venta completa desde reservas pendientes
      description: Confirma una venta con multiples items usando reservas pendientes
        del mismo documento, descuenta stock en una unica transaccion y registra movimientos
        y precios de venta.
      operationId: confirmarVenta
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VentaConfirmarIn'
        required: true
      responses:
        '200':
          description: Venta confirmada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VentaConfirmarOut'
              example:
                estado: CONFIRMADA
                comprobante: STK-000-00000
        '409':
          description: La venta no coincide con una reserva pendiente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                estado: ERROR
                codigo: RESERVA_NO_COINCIDE
                mensaje: No existe una reserva pendiente para el documento FV-000-00000,
                  producto 1 y cantidad 2.
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
components:
  schemas:
    CompraEventoIn:
      properties:
        mensaje_id:
          type: string
          maxLength: 100
          minLength: 1
          title: Mensaje Id
          examples:
          - CMP-2026-0001
        referencia_compra:
          type: string
          maxLength: 12
          minLength: 12
          pattern: ^[A-Z]{1,3}-\d{3}-\d{5}$
          title: Referencia Compra
          examples:
          - FV-000-00000
          example: FV-000-00000
          description: Referencia documental operativa con un prefijo de una a tres
            letras mayÃºsculas, seguido del formato 000-00000.
        producto_id:
          type: integer
          title: Producto Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        cantidad:
          type: integer
          exclusiveMinimum: 0.0
          title: Cantidad
          examples:
          - 2
        precio_compra:
          type: integer
          minimum: 0.0
          title: Precio Compra
          examples:
          - 15000
        proveedor_ref:
          anyOf:
          - type: string
            maxLength: 80
          - type: 'null'
          title: Proveedor Ref
      type: object
      required:
      - mensaje_id
      - referencia_compra
      - producto_id
      - cantidad
      - precio_compra
      title: CompraEventoIn
      example:
        cantidad: 10
        mensaje_id: CMP-2026-0001
        precio_compra: 9000
        producto_id: 1
        proveedor_ref: PROV-001
        referencia_compra: FV-000-00000
    CompraEventoOut:
      properties:
        mensaje_id:
          type: string
          title: Mensaje Id
        estado_procesamiento:
          type: string
          enum:
          - PENDIENTE
          - PROCESADO
          - ERROR
          title: Estado Procesamiento
          description: Estado del procesamiento del evento recibido desde Compras.
        producto_id:
          type: integer
          title: Producto Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        stock_total_actual:
          anyOf:
          - type: integer
            minimum: 0.0
            examples:
            - 10
          - type: 'null'
          title: Stock Total Actual
      type: object
      required:
      - mensaje_id
      - estado_procesamiento
      - producto_id
      title: CompraEventoOut
      example:
        estado_procesamiento: PROCESADO
        mensaje_id: CMP-2026-0001
        producto_id: 1
        stock_total_actual: 18
    ConfirmarReservaIn:
      properties:
        comprobante:
          anyOf:
          - type: string
            maxLength: 12
            minLength: 12
            pattern: ^[A-Z]{1,3}-\d{3}-\d{5}$
            example: FV-000-00000
          - type: 'null'
          title: Comprobante
          examples:
          - FV-000-00000
          description: Referencia documental operativa con un prefijo de una a tres
            letras mayÃºsculas, seguido del formato 000-00000.
        precio_venta:
          anyOf:
          - type: integer
            minimum: 0.0
            examples:
            - 15000
          - type: 'null'
          title: Precio Venta
      type: object
      title: ConfirmarReservaIn
      example:
        comprobante: FV-000-00000
        precio_venta: 15000
    ConfirmarReservaOut:
      properties:
        estado:
          type: string
          enum:
          - CONFIRMADA
          title: Estado
          description: Estado devuelto cuando la reserva fue confirmada.
          default: CONFIRMADA
        reserva_id:
          type: integer
          title: Reserva Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        producto_id:
          type: integer
          title: Producto Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        cantidad_descontada:
          type: integer
          minimum: 0.0
          title: Cantidad Descontada
          examples:
          - 10
        stock_total_actual:
          type: integer
          minimum: 0.0
          title: Stock Total Actual
          examples:
          - 10
        cantidad_reservada_actual:
          type: integer
          minimum: 0.0
          title: Cantidad Reservada Actual
          examples:
          - 10
        cantidad_disponible_actual:
          type: integer
          minimum: 0.0
          title: Cantidad Disponible Actual
          examples:
          - 10
      type: object
      required:
      - estado
      - reserva_id
      - producto_id
      - cantidad_descontada
      - stock_total_actual
      - cantidad_reservada_actual
      - cantidad_disponible_actual
      title: ConfirmarReservaOut
      example:
        cantidad_descontada: 2
        cantidad_disponible_actual: 8
        cantidad_reservada_actual: 0
        estado: CONFIRMADA
        producto_id: 1
        reserva_id: 101
        stock_total_actual: 8
    ErrorResponse:
      properties:
        estado:
          type: string
          enum:
          - ERROR
          title: Estado
          description: Estado fijo para respuestas de error.
          default: ERROR
        codigo:
          type: string
          enum:
          - VALIDACION_ERROR
          - PRODUCTO_NO_EXISTE
          - PRODUCTO_INACTIVO
          - PRODUCTO_CODIGO_DUPLICADO
          - STOCK_NO_INICIALIZADO
          - STOCK_INSUFICIENTE
          - RESERVA_NO_EXISTE
          - RESERVA_NO_PENDIENTE
          - RESERVA_NO_COINCIDE
          - NO_AUTENTICADO
          - ACCESO_DENEGADO
          - ERROR_INTERNO
          - ERROR_NO_CONTROLADO
          - MENSAJE_DUPLICADO
          - REPLAY_NO_COINCIDE
          - OPERACION_YA_PROCESADA
          - OPERACION_EN_PROCESO
          - CONFLICTO_CONCURRENCIA
          - DOCUMENTO_YA_PROCESADO
          - DOCUMENTO_YA_TIENE_RESERVA
          - RESERVA_YA_CONFIRMADA
          - RESERVA_YA_LIBERADA
          title: Codigo
          description: CÃ³digo tÃ©cnico de error devuelto por la API.
        mensaje:
          type: string
          title: Mensaje
          examples:
          - Descripcion clara del error.
      type: object
      required:
      - codigo
      - mensaje
      title: ErrorResponse
      example:
        codigo: CODIGO_ERROR
        estado: ERROR
        mensaje: Descripcion clara del error.
    HealthOut:
      properties:
        status:
          type: string
          title: Status
          examples:
          - ok
      type: object
      required:
      - status
      title: HealthOut
      example:
        status: ok
    LiberarReservaIn:
      properties:
        motivo_liberacion:
          type: string
          maxLength: 200
          minLength: 1
          title: Motivo Liberacion
          examples:
          - Cancelacion de venta
      type: object
      required:
      - motivo_liberacion
      title: LiberarReservaIn
      example:
        motivo_liberacion: Cancelacion de venta
    LiberarReservaOut:
      properties:
        estado:
          type: string
          enum:
          - LIBERADA
          title: Estado
          description: Estado devuelto cuando la reserva fue liberada.
          default: LIBERADA
        reserva_id:
          type: integer
          title: Reserva Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        cantidad_liberada:
          type: integer
          minimum: 0.0
          title: Cantidad Liberada
          examples:
          - 10
      type: object
      required:
      - estado
      - reserva_id
      - cantidad_liberada
      title: LiberarReservaOut
      example:
        cantidad_liberada: 2
        estado: LIBERADA
        reserva_id: 101
    MovimientoOut:
      properties:
        movimiento_id:
          type: integer
          title: Movimiento Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        producto_id:
          type: integer
          title: Producto Id
          minimum: 1
          description: Debe ser un identificador entero positivo.
        reserva_id:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          title: Reserva Id
          description: Debe ser un identificador entero positivo.
        tipo_movimiento:
          type: string
          enum:
          - COMPRA
          - RESERVA
          - VENTA
          - LIBERACION_RESERVA
          - AJUSTE
          title: Tipo Movimiento
          description: Tipo de operaciÃ³n que generÃ³ el movimiento de stock.
        origen:
          type: string
          enum:
          - COMPRAS
          - VENTAS
          - STOCK
          - SISTEMA
          title: Origen
          description: MÃ³dulo o sistema que originÃ³ el movimiento.
        comprobante:
          type: string
          title: Comprobante
          pattern: ^[A-Z]{1,3}-\d{3}-\d{5}$
          example: STK-000-00000
          description: 'Referencia documental operativa con un prefijo de una a tres
            letras mayÃºsculas, seguido del formato 000-00000. Ejemplo de comprobante
            emitido: STK-000-00000.'
        cantidad:
          type: integer
          minimum: 0.0
          title: Cantidad
          examples:
          - 10
        stock_anterior:
          type: integer
          minimum: 0.0
          title: Stock Anterior
          examples:
          - 10
        stock_posterior:
          type: integer
          minimum: 0.0
          title: Stock Posterior
          examples:
          - 10
        observacion:
          anyOf:
          - type: string
