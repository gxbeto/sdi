services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sdi
      POSTGRES_USER: stk_user
      POSTGRES_PASSWORD: stk_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
